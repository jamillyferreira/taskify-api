# application.yml
spring:
  config:
    import: optional:file:.env
  application:
    name: taskify-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
jwt:
  secret: ${JWT_SECRET}
  expiration: 900000

logging:
  level:
    org.flywaydb: INFO
    org.hibernate.SQL: DEBUG
    com.taskify: DEBUG  # Meus logs