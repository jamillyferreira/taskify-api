spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: taskify-api
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
jwt:
  secret: ${JWT_SECRET}
  expiration: 900000
logging:
  level:
    org.flywaydb: INFO
    com.taskify: INFO