spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: taskify-api
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
jwt:
  secret: ${JWT_SECRET}
  expiration: 900000
logging:
  level:
    org.flywaydb: INFO
    com.taskify: INFO